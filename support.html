<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お問い合わせ - Study with Friends</title>
  <style>
    :root {
      color-scheme: light;
      --accent: #2f7d6d;
      --text: #1f2933;
      --muted: #65727f;
      --border: #d9e2ec;
      --bg: #f7faf9;
      --panel: #ffffff;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.75;
      color: var(--text);
      background: var(--bg);
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 42px 20px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 30px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.25;
    }
    h2 {
      margin: 28px 0 8px;
      font-size: 20px;
    }
    p, li {
      margin: 0 0 10px;
    }
    ul {
      padding-left: 22px;
    }
    .muted {
      color: var(--muted);
    }
    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .button {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 16px;
      border-radius: 10px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 700;
    }
    .button:hover {
      text-decoration: none;
      opacity: 0.9;
    }
    nav {
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
  <main>
    <nav><a href="./index.html">Study with Friends トップへ戻る</a></nav>
    <section class="panel">
      <h1>お問い合わせ</h1>
      <p class="muted">Study with Friendsに関するお問い合わせ、不具合報告、データ削除のご相談はこちらからご連絡ください。</p>

      <h2>連絡先</h2>
      <p><a href="mailto:studywithfriends.app@gmail.com">studywithfriends.app@gmail.com</a></p>
      <a class="button" href="mailto:studywithfriends.app@gmail.com?subject=Study%20with%20Friends%20%E3%81%8A%E5%95%8F%E3%81%84%E5%90%88%E3%82%8F%E3%81%9B">メールを送る</a>

      <h2>お問い合わせ時に書いてほしいこと</h2>
      <ul>
        <li>お問い合わせ内容</li>
        <li>利用中の端末名</li>
        <li>iOSバージョン</li>
        <li>不具合の場合は、発生した画面や操作手順</li>
      </ul>

      <h2>関連ページ</h2>
      <ul>
        <li><a href="./privacy.html">プライバシーポリシー</a></li>
        <li><a href="./terms.html">利用規約</a></li>
      </ul>
    </section>
  </main>
</body>
</html>
